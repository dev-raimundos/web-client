version: '3'

vars:
  COMPOSE: docker compose -f docker/dev/docker-compose.yml
  WEB_CONTAINER: neon-vertex-web

tasks:
  dev:
    desc: "Sobe o frontend e acompanha os logs"
    cmds:
      - "{{.COMPOSE}} up --build -d"
      - task: logs

  dev:down:
    desc: "Para e remove os containers"
    cmds:
      - "{{.COMPOSE}} down"

  dev:reset:
    desc: "Para containers e sobe do zero"
    cmds:
      - "{{.COMPOSE}} down"
      - "{{.COMPOSE}} up --build -d"

  logs:
    desc: "Acompanha os logs em tempo real"
    cmds:
      - "{{.COMPOSE}} logs -f web"

  shell:
    desc: "Abre um shell no container"
    cmds:
      - docker exec -it {{.WEB_CONTAINER}} sh

  ps:
    desc: "Lista os containers do projeto"
    cmds:
      - "{{.COMPOSE}} ps"

  restart:
    desc: "Reinicia o container"
    cmds:
      - "{{.COMPOSE}} restart web"

  test:
    desc: "Roda os testes"
    cmds:
      - "{{.COMPOSE}} exec web npm test"

  build:
    desc: "Gera o build de produção"
    cmds:
      - "{{.COMPOSE}} exec web npm run build"
